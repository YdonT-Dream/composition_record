<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>教練專用 - 身體成份系統 (含匯出匯入)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary-color: #2c3e50; --accent-color: #3498db; --success-color: #2ecc71; --danger-color: #e74c3c; }
        body { font-family: sans-serif; background-color: #f8f9fa; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        button { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; color: white; }
        .btn-blue { background-color: var(--accent-color); }
        .btn-green { background-color: var(--success-color); }
        .btn-red { background-color: var(--danger-color); }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>教練數據管理系統</h1>

    <div class="card">
        <h2>數據備份與管理</h2>
        <div class="btn-group">
            <button class="btn-blue" onclick="exportData('all')">匯出所有學員資料</button>
            <button class="btn-blue" onclick="exportData('single')">匯出當前學員資料</button>
            <button class="btn-green" onclick="document.getElementById('fileInput').click()">匯入數據檔案</button>
            <input type="file" id="fileInput" accept=".json" onchange="importData(event)">
        </div>
        <p><small>* 提示：匯入檔案會將數據合併到現有系統中。</small></p>
    </div>

    </div>

<script>
    // --- 新增：匯出功能 ---
    function exportData(type) {
        let dataToExport = {};
        let fileName = 'all_students_data.json';

        if (type === 'all') {
            dataToExport = systemData;
        } else {
            const studentName = document.getElementById('studentSelect').value;
            if (!studentName) return alert('請先選擇一位學員');
            dataToExport[studentName] = systemData[studentName];
            fileName = `${studentName}_data.json`;
        }

        const blob = new Blob([JSON.stringify(dataToExport, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        a.click();
    }

    // --- 新增：匯入功能 ---
    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                // 合併數據
                systemData = { ...systemData, ...importedData };
                localStorage.setItem('coach_system_data', JSON.stringify(systemData));
                updateStudentDropdown();
                updateUI();
                alert('數據匯入成功！');
            } catch (err) {
                alert('檔案格式錯誤，請確保是有效的 JSON 檔案。');
            }
        };
        reader.readAsText(file);
    }
    
    // (保留原本的 systemData 初始化及其他函數...)
</script>
</body>
</html>
