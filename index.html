<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>教練專用 - 身體成份數據系統</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary-color: #2c3e50; --accent-color: #3498db; --success-color: #2ecc71; --danger-color: #e74c3c; --bg-color: #f8f9fa; }
        body { font-family: sans-serif; background-color: var(--bg-color); padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        button { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; color: white; margin-top: 10px; }
        .btn-blue { background-color: var(--accent-color); }
        .btn-green { background-color: var(--success-color); }
        .btn-red { background-color: var(--danger-color); }
        .comp-card { padding: 15px; border-radius: 6px; text-align: center; font-weight: bold; background: #f0f3f4; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: var(--primary-color); color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>教練數據管理系統</h1>

    <div class="card">
        <h2>學員管理</h2>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <select id="studentSelect" onchange="onStudentChange()" style="width:200px;"></select>
            <input type="text" id="newStudentName" placeholder="學員姓名" style="width:120px;">
            <input type="number" id="newStudentAge" placeholder="年齡" style="width:70px;">
            <input type="number" id="newStudentHeight" placeholder="身高(cm)" style="width:90px;">
            <button class="btn-green" onclick="addStudent()">新增學員</button>
        </div>
        <div style="margin-top:15px; display:flex; gap:10px;">
            <button class="btn-blue" onclick="exportData('all')">匯出全部數據</button>
            <button class="btn-blue" onclick="exportData('single')">匯出當前學員數據</button>
            <button class="btn-blue" onclick="document.getElementById('fileInput').click()">匯入數據</button>
            <input type="file" id="fileInput" accept=".json" style="display:none;" onchange="importData(event)">
        </div>
        <div id="studentInfo" style="margin-top:15px; font-weight:bold;"></div>
    </div>

    <div class="grid">
        <div class="card">
            <h2>輸入今日數據</h2>
            <form id="dataForm" onsubmit="saveRecord(event)">
                <label>日期：<input type="date" id="recordDate" required></label>
                <label>體重 (kg)：<input type="number" id="weight" step="0.1" required></label>
                <label>脂肪率 (%)：<input type="number" id="bodyFat" step="0.1" required></label>
                <label>內臟脂肪：<input type="number" id="visceralFat" step="0.5" required></label>
                <label>基礎代謝 (kcal)：<input type="number" id="bmr" required></label>
                <label>生理年齡：<input type="number" id="metabolicAge" required></label>
                <label>水分 (%)：<input type="number" id="water" step="0.1" required></label>
                <button type="submit" class="btn-blue" style="width:100%;">儲存紀錄</button>
            </form>
        </div>

        <div>
            <div class="card">
                <h2>即時數據對比</h2>
                <div id="comparisonContainer" class="comp-card">請選擇學員</div>
            </div>
            <div class="card">
                <h2>數據趨勢</h2>
                <canvas id="historyChart" height="200"></canvas>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>歷史明細</h2>
        <table id="historyTable"><thead><tr><th>日期</th><th>體重</th><th>脂肪%</th><th>內臟脂</th><th>BMR</th><th>生理年齡</th><th>水分%</th><th>操作</th></tr></thead><tbody></tbody></table>
    </div>
</div>

<script>
    let systemData = JSON.parse(localStorage.getItem('coach_system_data')) || { students: {}, records: {} };
    // students 格式: { "姓名": { age, height } }, records 格式: { "姓名": [records] }

    window.onload = () => {
        document.getElementById('recordDate').valueAsDate = new Date();
        updateStudentDropdown();
    };

    function addStudent() {
        const name = document.getElementById('newStudentName').value;
        const age = document.getElementById('newStudentAge').value;
        const height = document.getElementById('newStudentHeight').value;
        if (!name || !age || !height) return alert('請填寫完整學員資訊');
        systemData.students[name] = { age, height };
        systemData.records[name] = [];
        saveToLocalStorage();
        updateStudentDropdown();
    }

    function updateStudentDropdown() {
        const select = document.getElementById('studentSelect');
        select.innerHTML = '<option value="">-- 選擇學員 --</option>';
        Object.keys(systemData.students).forEach(name => {
            select.innerHTML += `<option value="${name}">${name}</option>`;
        });
    }

    function onStudentChange() {
        const name = document.getElementById('studentSelect').value;
        if (name) {
            const info = systemData.students[name];
            document.getElementById('studentInfo').innerHTML = `當前學員：${name} | 年齡：${info.age} | 身高：${info.height}cm`;
        }
        updateUI();
    }

    function saveRecord(e) {
        e.preventDefault();
        const name = document.getElementById('studentSelect').value;
        if (!name) return alert('請選擇學員');
        const record = {
            date: document.getElementById('recordDate').value,
            weight: parseFloat(document.getElementById('weight').value),
            bodyFat: parseFloat(document.getElementById('bodyFat').value),
            visceralFat: parseFloat(document.getElementById('visceralFat').value),
            bmr: parseInt(document.getElementById('bmr').value),
            metabolicAge: parseInt(document.getElementById('metabolicAge').value),
            water: parseFloat(document.getElementById('water').value)
        };
        systemData.records[name].push(record);
        saveToLocalStorage();
        updateUI();
    }

    function saveToLocalStorage() {
        localStorage.setItem('coach_system_data', JSON.stringify(systemData));
    }

    function exportData(type) {
        let data = type === 'all' ? systemData : { 
            students: { [document.getElementById('studentSelect').value]: systemData.students[document.getElementById('studentSelect').value] },
            records: { [document.getElementById('studentSelect').value]: systemData.records[document.getElementById('studentSelect').value] }
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `data_export.json`;
        a.click();
    }

    function importData(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            const imported = JSON.parse(event.target.result);
            systemData.students = { ...systemData.students, ...imported.students };
            systemData.records = { ...systemData.records, ...imported.records };
            saveToLocalStorage();
            updateStudentDropdown();
            alert('匯入成功');
        };
        reader.readAsText(e.target.files[0]);
    }

    function updateUI() {
        // 更新表格與對比邏輯 (延續之前的邏輯)
        const name = document.getElementById('studentSelect').value;
        if (!name) return;
        const recs = systemData.records[name];
        const tbody = document.querySelector('#historyTable tbody');
        tbody.innerHTML = '';
        [...recs].reverse().forEach((r, i) => {
            tbody.innerHTML += `<tr><td>${r.date}</td><td>${r.weight}</td><td>${r.bodyFat}</td><td>${r.visceralFat}</td><td>${r.bmr}</td><td>${r.metabolicAge}</td><td>${r.water}</td><td>刪除</td></tr>`;
        });
        // 這裡可繼續加入 Chart.js 的渲染邏輯
    }
</script>
</body>
</html>
