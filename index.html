<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>教練數據管理系統 - 修正版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary-color: #2c3e50; --accent-color: #3498db; --bg-color: #f8f9fa; }
        body { font-family: sans-serif; background-color: var(--bg-color); padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, select { padding: 8px; margin: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; cursor: pointer; background: var(--accent-color); color: white; border: none; border-radius: 4px; }
        .info-box { background: #eef; padding: 10px; border-radius: 5px; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container" style="max-width: 900px; margin: auto;">
    <h1>教練數據管理系統</h1>

    <div class="card">
        <h2>學員管理</h2>
        <div>
            <select id="studentSelect" onchange="onStudentChange()"><option value="">-- 請選擇學員 --</option></select>
            <input type="text" id="newStudentName" placeholder="姓名">
            <input type="number" id="newStudentAge" placeholder="年齡">
            <input type="number" id="newStudentHeight" placeholder="身高(cm)">
            <button onclick="addOrUpdateStudent()">新增/更新學員</button>
        </div>
        <div id="studentInfo" class="info-box">請選擇或新增學員以顯示資訊</div>
        <div>
            <button onclick="exportData('all')">匯出全部</button>
            <button onclick="document.getElementById('fileInput').click()">匯入檔案</button>
            <input type="file" id="fileInput" hidden onchange="importData(event)">
        </div>
    </div>

    <div class="card">
        <h2>紀錄數據</h2>
        <form id="dataForm" onsubmit="saveRecord(event)">
            <input type="date" id="recordDate" required>
            <input type="number" id="weight" placeholder="體重(kg)" step="0.1" required>
            <input type="number" id="bodyFat" placeholder="脂肪%" step="0.1" required>
            <input type="number" id="visceralFat" placeholder="內臟脂" step="0.5" required>
            <input type="number" id="bmr" placeholder="代謝(kcal)" required>
            <input type="number" id="metabolicAge" placeholder="心理年齡" required>
            <input type="number" id="water" placeholder="水分%" step="0.1" required>
            <button type="submit">儲存紀錄</button>
        </form>
    </div>
</div>

<script>
    let systemData = JSON.parse(localStorage.getItem('coach_system_data')) || { students: {}, records: {} };

    function addOrUpdateStudent() {
        const name = document.getElementById('newStudentName').value;
        const age = document.getElementById('newStudentAge').value;
        const height = document.getElementById('newStudentHeight').value;
        
        if (!name || !age || !height) return alert('請填寫完整資訊');
        
        systemData.students[name] = { age, height };
        if (!systemData.records[name]) systemData.records[name] = [];
        
        localStorage.setItem('coach_system_data', JSON.stringify(systemData));
        updateStudentDropdown(name);
        onStudentChange();
        alert('學員資訊已儲存');
    }

    function updateStudentDropdown(selectedName = "") {
        const select = document.getElementById('studentSelect');
        select.innerHTML = '<option value="">-- 請選擇學員 --</option>';
        Object.keys(systemData.students).forEach(name => {
            select.innerHTML += `<option value="${name}" ${name === selectedName ? 'selected' : ''}>${name}</option>`;
        });
    }

    function onStudentChange() {
        const name = document.getElementById('studentSelect').value;
        const infoDiv = document.getElementById('studentInfo');
        if (name && systemData.students[name]) {
            const s = systemData.students[name];
            infoDiv.innerHTML = `當前學員：<strong>${name}</strong> | 年齡：${s.age} | 身高：${s.height}cm`;
            document.getElementById('newStudentName').value = name;
            document.getElementById('newStudentAge').value = s.age;
            document.getElementById('newStudentHeight').value = s.height;
        } else {
            infoDiv.innerHTML = "請選擇或新增學員以顯示資訊";
        }
    }

    function saveRecord(e) {
        e.preventDefault();
        const name = document.getElementById('studentSelect').value;
        if (!name) return alert('請先選擇學員！');
        
        const record = {
            date: document.getElementById('recordDate').value,
            weight: document.getElementById('weight').value,
            bodyFat: document.getElementById('bodyFat').value,
            visceralFat: document.getElementById('visceralFat').value,
            bmr: document.getElementById('bmr').value,
            metabolicAge: document.getElementById('metabolicAge').value,
            water: document.getElementById('water').value
        };
        
        systemData.records[name].push(record);
        localStorage.setItem('coach_system_data', JSON.stringify(systemData));
        alert('紀錄成功');
    }

    // 匯出匯入功能 (保持不變)
    function exportData() {
        const blob = new Blob([JSON.stringify(systemData)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'data.json';
        a.click();
    }

    function importData(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            systemData = JSON.parse(event.target.result);
            localStorage.setItem('coach_system_data', JSON.stringify(systemData));
            updateStudentDropdown();
            alert('匯入成功');
        };
        reader.readAsText(e.target.files[0]);
    }

    window.onload = () => {
        document.getElementById('recordDate').valueAsDate = new Date();
        updateStudentDropdown();
    };
</script>
</body>
</html>
