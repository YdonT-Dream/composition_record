<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>學員身體數據報告系統</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .grid-inputs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 90%; }
        button { padding: 10px 15px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 4px; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 11px; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: center; }
        th { background: #3498db; color: white; }
        #no-print { background: #fdfdfd; border: 1px dashed #ccc; }
    </style>
</head>
<body>

<div id="reportArea" style="max-width: 900px; margin: auto;">
    <h1 id="mainTitle">學員身體數據報告</h1>

    <div class="card" id="studentHeader">
        <h2 id="pdfName">請選擇學員</h2>
        <p id="pdfInfo"></p>
    </div>

    <div class="card" id="no-print">
        <h3>學員管理與輸入</h3>
        <select id="studentSelect" onchange="onStudentChange()"><option value="">-- 選擇學員 --</option></select>
        <input type="text" id="name" placeholder="姓名">
        <input type="number" id="age" placeholder="年紀">
        <input type="number" id="height" placeholder="身高">
        <input type="text" id="bodyType" placeholder="體型種類">
        <button onclick="saveStudent()">儲存學員</button>
        <button style="background:#e74c3c;" onclick="generatePDF()">匯出 PDF 報告</button>
        <hr>
        <form onsubmit="saveRecord(event)" class="grid-inputs">
            <input type="date" id="date" required>
            <input type="number" id="weight" placeholder="體重(kg)" step="0.1" required>
            <input type="number" id="fat" placeholder="總脂肪%" step="0.1" required>
            <input type="number" id="muscle" placeholder="總肌肉(kg)" step="0.1" required>
            <input type="number" id="water" placeholder="水分%" step="0.1" required>
            <input type="number" id="vFat" placeholder="內臟脂肪" step="0.5">
            <input type="number" id="lFat" placeholder="左手脂%"> <input type="number" id="rFat" placeholder="右手脂%">
            <input type="number" id="tFat" placeholder="軀幹脂%"> <input type="number" id="llFat" placeholder="左腳脂%">
            <input type="number" id="rlFat" placeholder="右腳脂%"> <input type="number" id="lMus" placeholder="左手肌kg">
            <input type="number" id="rMus" placeholder="右手肌kg"> <input type="number" id="tMus" placeholder="軀幹肌kg">
            <input type="number" id="llMus" placeholder="左腳肌kg"> <input type="number" id="rlMus" placeholder="右腳肌kg">
            <button type="submit">儲存紀錄</button>
        </form>
    </div>

    <div class="card">
        <h3>趨勢圖</h3>
        <canvas id="myChart" height="100"></canvas>
    </div>

    <div class="card">
        <h3>歷史紀錄數據</h3>
        <div style="overflow-x:auto;">
            <table id="historyTable">
                <thead><tr><th>日期</th><th>體重</th><th>脂%</th><th>肌kg</th><th>水分%</th><th>內臟脂</th><th>左手脂</th><th>右手脂</th><th>軀幹脂</th><th>左腳脂</th><th>右腳脂</th><th>左手肌</th><th>右手肌</th><th>軀幹肌</th><th>左腳肌</th><th>右腳肌</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let systemData = JSON.parse(localStorage.getItem('coach_data')) || { students: {}, records: {} };
    let chartInstance = null;

    function saveStudent() {
        const name = document.getElementById('name').value.trim();
        systemData.students[name] = { age: document.getElementById('age').value, height: document.getElementById('height').value, type: document.getElementById('bodyType').value };
        if (!systemData.records[name]) systemData.records[name] = [];
        localStorage.setItem('coach_data', JSON.stringify(systemData));
        updateSelect();
        alert('學員資訊已儲存');
    }

    function updateSelect() {
        const s = document.getElementById('studentSelect');
        s.innerHTML = '<option value="">-- 選擇學員 --</option>';
        Object.keys(systemData.students).forEach(n => s.innerHTML += `<option value="${n}">${n}</option>`);
    }

    function onStudentChange() {
        const name = document.getElementById('studentSelect').value;
        if (!name) return;
        const s = systemData.students[name];
        document.getElementById('name').value = name;
        document.getElementById('age').value = s.age;
        document.getElementById('height').value = s.height;
        document.getElementById('bodyType').value = s.type;
        document.getElementById('pdfName').innerText = "學員: " + name;
        document.getElementById('pdfInfo').innerText = `年紀: ${s.age}歲 | 身高: ${s.height}cm | 體型: ${s.type}`;
        render(name);
    }

    function saveRecord(e) {
        e.preventDefault();
        const name = document.getElementById('studentSelect').value;
        const rec = { date: document.getElementById('date').value, weight: document.getElementById('weight').value, fat: document.getElementById('fat').value, muscle: document.getElementById('muscle').value, water: document.getElementById('water').value, vFat: document.getElementById('vFat').value, lFat: document.getElementById('lFat').value, rFat: document.getElementById('rFat').value, tFat: document.getElementById('tFat').value, llFat: document.getElementById('llFat').value, rlFat: document.getElementById('rlFat').value, lMus: document.getElementById('lMus').value, rMus: document.getElementById('rMus').value, tMus: document.getElementById('tMus').value, llMus: document.getElementById('llMus').value, rlMus: document.getElementById('rlMus').value };
        systemData.records[name].push(rec);
        localStorage.setItem('coach_data', JSON.stringify(systemData));
        render(name);
    }

    function render(name) {
        const recs = systemData.records[name];
        const tbody = document.querySelector('#historyTable tbody');
        tbody.innerHTML = recs.map(r => `<tr><td>${r.date}</td><td>${r.weight}</td><td>${r.fat}</td><td>${r.muscle}</td><td>${r.water}</td><td>${r.vFat}</td><td>${r.lFat}</td><td>${r.rFat}</td><td>${r.tFat}</td><td>${r.llFat}</td><td>${r.rlFat}</td><td>${r.lMus}</td><td>${r.rMus}</td><td>${r.tMus}</td><td>${r.llMus}</td><td>${r.rlMus}</td></tr>`).join('');
        
        const ctx = document.getElementById('myChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, { type: 'line', data: { labels: recs.map(r => r.date), datasets: [{ label: '體重', data: recs.map(r => r.weight), borderColor: 'blue' }, { label: '脂肪%', data: recs.map(r => r.fat), borderColor: 'red' }, { label: '肌肉kg', data: recs.map(r => r.muscle), borderColor: 'green' }] } });
    }

    function generatePDF() {
        const studentName = document.getElementById('studentSelect').value;
        if (!studentName) return alert('請先選擇一位學員以匯出報告');

        // 獲取當前時間並格式化
        const now = new Date();
        const dateStr = now.toISOString().split('T')[0]; // YYYY-MM-DD
        const timeStr = now.getHours() + '-' + now.getMinutes(); // HH-MM
        const fileName = `${studentName}_${dateStr}_${timeStr}.pdf`;

        const el = document.getElementById('no-print');
        el.style.display = 'none'; // 匯出時隱藏輸入區
        
        html2pdf()
            .set({
                filename: fileName,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            })
            .from(document.getElementById('reportArea'))
            .save()
            .then(() => {
                el.style.display = 'block'; // 匯出後恢復顯示
            });
    }
</script>
</body>
</html>
