<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業學員身體組成管理系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 列印樣式隔離：列印時隱藏表單與按鈕 */
        @media print {
            body * {
                visibility: hidden;
            }
            #printable-report, #printable-report * {
                visibility: visible;
            }
            #printable-report {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
            }
            .no-print {
                display: none !important;
            }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <header class="bg-indigo-900 text-white shadow-md no-print">
        <div class="container mx-auto px-6 py-4 flex flex-wrap justify-between items-center gap-4">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="fa-solid fa-dumbbell"></i> 身體組成數據管理系統
            </h1>
            <div class="flex items-center gap-3">
                <button onclick="exportJson()" class="bg-amber-600 hover:bg-amber-700 text-white px-4 py-2 rounded-lg cursor-pointer flex items-center gap-2 transition text-sm">
                    <i class="fa-solid fa-download"></i> 匯出 JSON 紀錄
                </button>
                <input type="file" id="import-file" accept=".json" class="hidden" onchange="importJson(this)">
                <button onclick="document.getElementById('import-file').click()" class="bg-orange-600 hover:bg-orange-700 text-white px-4 py-2 rounded-lg cursor-pointer flex items-center gap-2 transition text-sm">
                    <i class="fa-solid fa-upload"></i> 匯入 JSON 紀錄
                </button>
                <button onclick="window.print()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg cursor-pointer flex items-center gap-2 transition text-sm">
                    <i class="fa-solid fa-file-pdf"></i> 匯出橫向 A4 報告
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6 py-8 flex flex-col lg:flex-row gap-8">
        
        <aside class="w-full lg:w-1/4 bg-white p-6 rounded-xl shadow-sm h-fit no-print">
            <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">
                <i class="fa-solid fa-users text-indigo-600"></i> 學員管理
            </h2>
            
            <div class="mb-6 bg-gray-50 p-4 rounded-lg border">
                <h3 class="text-sm font-semibold text-gray-700 mb-2">新增學員</h3>
                <form id="add-student-form" class="space-y-3">
                    <div>
                        <label class="block text-xs text-gray-600 mb-1">姓名</label>
                        <input type="text" id="new-name" required class="w-full text-sm border p-2 rounded-lg bg-white focus:outline-indigo-500">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs text-gray-600 mb-1">年紀</label>
                            <input type="number" id="new-age" required class="w-full text-sm border p-2 rounded-lg bg-white focus:outline-indigo-500">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-600 mb-1">身高 (cm)</label>
                            <input type="number" id="new-height" step="0.1" required class="w-full text-sm border p-2 rounded-lg bg-white focus:outline-indigo-500">
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-sm py-2 rounded-lg cursor-pointer transition">
                        <i class="fa-solid fa-user-plus"></i> 新增學員
                    </button>
                </form>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-2">選擇學員</label>
                <select id="student-select" class="w-full border p-3 rounded-lg bg-white shadow-sm focus:outline-indigo-500">
                    <option value="">-- 請選擇或搜尋學員 --</option>
                </select>
            </div>

            <div id="student-card" class="bg-indigo-50 border border-indigo-100 p-4 rounded-lg hidden">
                <h3 class="font-bold text-indigo-900 mb-2" id="card-name">學員姓名</h3>
                <p class="text-sm text-indigo-700">年紀：<span id="card-age">--</span> 歲</p>
                <p class="text-sm text-indigo-700">身高：<span id="card-height">--</span> cm</p>
            </div>
        </aside>

        <div id="printable-report" class="w-full lg:w-3/4 space-y-8">
            
            <section id="report-header-section" class="bg-indigo-900 text-white p-6 rounded-xl shadow-sm hidden print:block">
                <div class="flex justify-between items-center">
                    <div>
                        <h2 class="text-2xl font-bold flex items-center gap-2">
                            <i class="fa-solid fa-clipboard-user"></i> 學員身體組成報告
                        </h2>
                        <p class="text-indigo-200 text-sm mt-1">產出時間：<span id="report-time"></span></p>
                    </div>
                    <div class="bg-indigo-800/50 backdrop-blur-sm p-4 rounded-lg border border-indigo-700 text-right min-w-[200px]">
                        <p class="text-lg font-extrabold text-white" id="report-name">--</p>
                        <p class="text-sm text-indigo-200 mt-1">年紀：<span id="report-age">--</span> 歲 &nbsp;|&nbsp; 身高：<span id="report-height">--</span> cm</p>
                    </div>
                </div>
            </section>

            <section class="bg-white p-6 rounded-xl shadow-sm no-print">
                <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2 flex items-center gap-2">
                    <i class="fa-solid fa-pen-to-square text-indigo-600"></i> 多維度身體組成記錄
                </h2>
                <form id="record-form" class="space-y-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">記錄日期</label>
                        <input type="date" id="record-date" required class="border p-2 rounded-lg w-48 bg-white focus:outline-indigo-500">
                    </div>

                    <div>
                        <h3 class="text-md font-semibold text-indigo-900 border-b border-indigo-50 pb-1 mb-3">1. 核心身體組成數據</h3>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div><label class="block text-xs text-gray-600">體重 (kg)</label><input type="number" id="f-weight" step="0.1" required class="w-full border p-2 rounded-lg mt-1"></div>
                            <div><label class="block text-xs text-gray-600">骨骼肌重 (kg)</label><input type="number" id="f-muscle" step="0.1" required class="w-full border p-2 rounded-lg mt-1"></div>
                            <div><label class="block text-xs text-gray-600">體脂肪率 (%)</label><input type="number" id="f-fat" step="0.1" required class="w-full border p-2 rounded-lg mt-1"></div>
                            <div><label class="block text-xs text-gray-600">基礎代謝率 (kcal)</label><input type="number" id="f-bmr" step="1" required class="w-full border p-2 rounded-lg mt-1"></div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
                            <div>
                                <label class="block text-xs text-gray-600">體水分 (L 或 %)</label>
                                <input type="number" id="f-water" step="0.1" placeholder="例如: 35.2" class="w-full border p-2 rounded-lg mt-1">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-600">內臟脂肪等級</label>
                                <input type="number" id="f-visceral" step="1" min="1" max="50" placeholder="例如: 6" class="w-full border p-2 rounded-lg mt-1">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-600">身體類型 (1~7 類別)</label>
                                <select id="f-bodytype" class="w-full border p-2 rounded-lg mt-1 bg-white">
                                    <option value="">-- 請選擇數字類別 --</option>
                                    <option value="1">1 - 隱性肥胖 (瘦胖子)</option>
                                    <option value="2">2 - 偏瘦型</option>
                                    <option value="3">3 - 缺乏運動型</option>
                                    <option value="4">4 - 標準肌肉型</option>
                                    <option value="5">5 - 結實型</option>
                                    <option value="6">6 - 隱性肥胖 (肌肉少、脂肪多)</option>
                                    <option value="7">7 - 肥胖肌肉型</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div>
                        <h3 class="text-md font-semibold text-indigo-900 border-b border-indigo-50 pb-1 mb-3">2. 各部位肌肉量 (kg) <span class="text-xs font-normal text-gray-400">(非必填)</span></h3>
                        <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
                            <div><label class="block text-xs text-gray-600">右手肌肉量</label><input type="number" id="f-m-ra" step="0.1" class="w-full border p-2 rounded-lg mt-1"></div>
                            <div><label class="block text-xs text-gray-600">左手肌肉量</label><input type="number" id="f-m-la" step="0.1" class="w-full border p-2 rounded-lg mt-1"></div>
                            <div><label class="block text-xs text-gray-600">軀幹肌肉量</label><input type="number" id="f-m-trunk" step="0.1" class="w-full border p-2 rounded-lg mt-1"></div>
                            <div><label class="block text-xs text-gray-600">右腿肌肉量</label><input type="number" id="f-m-rl" step="0.1" class="w-full border p-2 rounded-lg mt-1"></div>
                            <div><label class="block text-xs text-gray-600">左腿肌肉量</label><input type="number" id="f-m-ll" step="0.1" class="w-full border p-2 rounded-lg mt-1"></div>
                        </div>
                    </div>

                    <div>
                        <h3 class="text-md font-semibold text-indigo-900 border-b border-indigo-50 pb-1 mb-3">3. 各部位體脂肪 (kg) <span class="text-xs font-normal text-gray-400">(非必填)</span></h3>
                        <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
                            <div><label class="block text-xs text-gray-600">右手體脂肪</label><input type="number" id="f-f-ra" step="0.1" class="w-full border p-2 rounded-lg mt-1"></div>
                            <div><label class="block text-xs text-gray-600">左手體脂肪</label><input type="number" id="f-f-la" step="0.1" class="w-full border p-2 rounded-lg mt-1"></div>
                            <div><label class="block text-xs text-gray-600">軀幹體脂肪</label><input type="number" id="f-f-trunk" step="0.1" class="w-full border p-2 rounded-lg mt-1"></div>
                            <div><label class="block text-xs text-gray-600">右腿體脂肪</label><input type="number" id="f-f-rl" step="0.1" class="w-full border p-2 rounded-lg mt-1"></div>
                            <div><label class="block text-xs text-gray-600">左腿體脂肪</label><input type="number" id="f-f-ll" step="0.1" class="w-full border p-2 rounded-lg mt-1"></div>
                        </div>
                    </div>

                    <div class="flex justify-end gap-4 pt-4 border-t">
                        <button type="submit" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-lg font-semibold cursor-pointer transition">
                            <i class="fa-solid fa-floppy-disk"></i> 儲存數據並重置表單
                        </button>
                    </div>
                </form>
            </section>

            <section class="bg-white p-6 rounded-xl shadow-sm">
                <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2 flex items-center gap-2">
                    <i class="fa-solid fa-chart-line text-indigo-600"></i> 數據視覺化趨勢
                </h2>
                <div class="h-64">
                    <canvas id="trendChart" class="w-full h-full"></canvas>
                </div>
            </section>
            
            

            <section class="bg-white p-6 rounded-xl shadow-sm">
                <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2 flex items-center gap-2">
                    <i class="fa-solid fa-table-list text-indigo-600"></i> 歷史數據明細表
                </h2>
                <div class="overflow-x-auto border rounded-lg">
                    <table class="w-full text-sm text-left text-gray-600 whitespace-nowrap">
                        <thead class="bg-gray-50 text-gray-700 uppercase text-xs">
                            <tr>
                                <th scope="col" class="px-4 py-3 border-r">日期</th>
                                <th scope="col" class="px-4 py-3 border-r">體重(kg)</th>
                                <th scope="col" class="px-4 py-3 border-r">骨骼肌(kg)</th>
                                <th scope="col" class="px-4 py-3 border-r">體脂率(%)</th>
                                <th scope="col" class="px-4 py-3 border-r">水分</th>
                                <th scope="col" class="px-4 py-3 border-r">內臟脂肪</th>
                                <th scope="col" class="px-4 py-3 border-r">身體類型(1~7)</th>
                                <th scope="col" class="px-4 py-3 border-r">基礎代謝</th>
                                <th scope="col" class="px-4 py-3 border-r">右手肌</th>
                                <th scope="col" class="px-4 py-3 border-r">左手肌</th>
                                <th scope="col" class="px-4 py-3 border-r">軀幹肌</th>
                                <th scope="col" class="px-4 py-3 border-r">右腿肌</th>
                                <th scope="col" class="px-4 py-3 border-r">左腿肌</th>
                                <th scope="col" class="px-4 py-3 border-r">右手脂</th>
                                <th scope="col" class="px-4 py-3 border-r">左手脂</th>
                                <th scope="col" class="px-4 py-3 border-r">軀幹脂</th>
                                <th scope="col" class="px-4 py-3 border-r">右腿脂</th>
                                <th scope="col" class="px-4 py-3 border-r">左腿脂</th>
                            </tr>
                        </thead>
                        <tbody id="history-table-body">
                            <tr class="border-b text-gray-400 text-center">
                                <td colspan="18" class="py-6">尚未選擇學員或無歷史數據</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

        </div>
    </main>

    <script>
        // 初始化 LocalStorage 資料
        let students = JSON.parse(localStorage.getItem('students')) || [];
        let records = JSON.parse(localStorage.getItem('records')) || [];

        // DOM 元素
        const studentSelect = document.getElementById('student-select');
        const studentCard = document.getElementById('student-card');
        const addStudentForm = document.getElementById('add-student-form');
        const recordForm = document.getElementById('record-form');
        const recordDate = document.getElementById('record-date');
        const historyTableBody = document.getElementById('history-table-body');

        // 初始化 Chart.js 實體
        const ctx = document.getElementById('trendChart').getContext('2d');
        let trendChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], // 日期
                datasets: [
                    {
                        label: '體重 (kg)',
                        data: [],
                        borderColor: '#4f46e5', // 靛色
                        backgroundColor: 'rgba(79, 70, 229, 0.1)',
                        tension: 0.1,
                        fill: true
                    },
                    {
                        label: '骨骼肌重 (kg)',
                        data: [],
                        borderColor: '#059669', // 翡翠綠
                        backgroundColor: 'rgba(5, 150, 105, 0.1)',
                        tension: 0.1,
                        fill: true
                    },
                    {
                        label: '體脂肪率 (%)',
                        data: [],
                        borderColor: '#dc2626', // 亮紅色
                        backgroundColor: 'rgba(220, 38, 38, 0.1)',
                        tension: 0.1,
                        fill: true
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: false
                    }
                }
            }
        });

        // 載入學員下拉選單選項
        function updateStudentSelect() {
            studentSelect.innerHTML = '<option value="">-- 請選擇或搜尋學員 --</option>';
            students.forEach(student => {
                const option = document.createElement('option');
                option.value = student.id;
                option.textContent = `${student.name} (身高: ${student.height}cm)`;
                studentSelect.appendChild(option);
            });
        }

        // 初始化執行
        recordDate.value = new Date().toISOString().substring(0, 10);
        updateStudentSelect();

        // 更新折線圖資料函式
        function updateChart(studentRecords) {
            const sortedRecords = [...studentRecords].sort((a, b) => new Date(a.date) - new Date(b.date));
            const labels = sortedRecords.map(r => r.date);
            const weightData = sortedRecords.map(r => parseFloat(r.weight) || 0);
            const muscleData = sortedRecords.map(r => parseFloat(r.muscle) || 0);
            const fatData = sortedRecords.map(r => parseFloat(r.fat) || 0);

            trendChart.data.labels = labels;
            trendChart.data.datasets[0].data = weightData;
            trendChart.data.datasets[1].data = muscleData;
            trendChart.data.datasets[2].data = fatData;
            trendChart.update();
        }

        // 1. 新增學員邏輯 + 回調檢查與反饋
        addStudentForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('new-name').value.trim();
            const age = document.getElementById('new-age').value;
            const height = document.getElementById('new-height').value;

            const newStudent = {
                id: Date.now().toString(),
                name,
                age,
                height
            };

            try {
                students.push(newStudent);
                localStorage.setItem('students', JSON.stringify(students));

                const verifyStorage = JSON.parse(localStorage.getItem('students')) || [];
                const isSaved = verifyStorage.some(s => s.id === newStudent.id);

                if (isSaved) {
                    alert(`【系統回調確認】\n學員「${name}」已成功登記！`);
                    addStudentForm.reset();
                    updateStudentSelect();
                    
                    studentSelect.value = newStudent.id;
                    studentSelect.dispatchEvent(new Event('change'));
                } else {
                    throw new Error('寫入至 LocalStorage 後找不到該筆資料。');
                }
            } catch (err) {
                alert(`【錯誤】新學員登記失敗：${err.message}`);
                console.error('Add student error:', err);
            }
        });

        // 2. 聯動載入學員資料與歷史紀錄 (增強報表抬頭資訊)
        studentSelect.addEventListener('change', function() {
            const selectedId = this.value;
            
            const reportHeaderSec = document.getElementById('report-header-section');
            
            if (!selectedId) {
                studentCard.classList.add('hidden');
                historyTableBody.innerHTML = '<tr class="border-b text-gray-400 text-center"><td colspan="18" class="py-6">尚未選擇學員或無歷史數據</td></tr>';
                
                reportHeaderSec.classList.add('hidden');
                updateChart([]);
                return;
            }

            const student = students.find(s => s.id === selectedId);
            if (student) {
                // 側邊欄卡片
                document.getElementById('card-name').textContent = student.name;
                document.getElementById('card-age').textContent = student.age;
                document.getElementById('card-height').textContent = student.height;
                studentCard.classList.remove('hidden');

                // 列印報表抬頭 (A4 列印專用)
                document.getElementById('report-name').textContent = student.name;
                document.getElementById('report-age').textContent = student.age;
                document.getElementById('report-height').textContent = student.height;
                document.getElementById('report-time').textContent = new Date().toLocaleString('zh-TW', { hour12: false });
                reportHeaderSec.classList.remove('hidden');
            }

            const studentRecords = records.filter(r => r.studentId === selectedId);
            historyTableBody.innerHTML = '';

            if (studentRecords.length === 0) {
                historyTableBody.innerHTML = '<tr class="border-b text-gray-400 text-center"><td colspan="18" class="py-6">此學員目前無身體組成紀錄</td></tr>';
                updateChart([]);
            } else {
                studentRecords.sort((a,b) => new Date(b.date) - new Date(a.date)); // 最新排在最上面
                updateChart(studentRecords);

                studentRecords.forEach(r => {
                    const row = `
                        <tr class="border-b hover:bg-gray-50">
                            <td class="px-4 py-3 font-medium border-r">${r.date}</td>
                            <td class="px-4 py-3 border-r">${r.weight} kg</td>
                            <td class="px-4 py-3 border-r">${r.muscle} kg</td>
                            <td class="px-4 py-3 border-r">${r.fat} %</td>
                            <td class="px-4 py-3 border-r">${r.water ? r.water + ' L' : '--'}</td>
                            <td class="px-4 py-3 border-r">${r.visceral || '--'}</td>
                            <td class="px-4 py-3 border-r">${r.bodytype ? '類別 ' + r.bodytype : '--'}</td>
                            <td class="px-4 py-3 border-r">${r.bmr} kcal</td>
                            <td class="px-4 py-3 border-r">${r.m_ra || '--'}</td>
                            <td class="px-4 py-3 border-r">${r.m_la || '--'}</td>
                            <td class="px-4 py-3 border-r">${r.m_trunk || '--'}</td>
                            <td class="px-4 py-3 border-r">${r.m_rl || '--'}</td>
                            <td class="px-4 py-3 border-r">${r.m_ll || '--'}</td>
                            <td class="px-4 py-3 border-r">${r.f_ra || '--'}</td>
                            <td class="px-4 py-3 border-r">${r.f_la || '--'}</td>
                            <td class="px-4 py-3 border-r">${r.f_trunk || '--'}</td>
                            <td class="px-4 py-3 border-r">${r.f_rl || '--'}</td>
                            <td class="px-4 py-3 border-r">${r.f_ll || '--'}</td>
                        </tr>
                    `;
                    historyTableBody.innerHTML += row;
                });
            }
        });

        // 3. 儲存多維度數據邏輯
        recordForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const selectedStudentId = studentSelect.value;
            if (!selectedStudentId) {
                alert('請先在左側面板「選擇學員」後，再進行數據儲存！');
                return;
            }

            const newRecord = {
                studentId: selectedStudentId,
                date: recordDate.value,
                weight: document.getElementById('f-weight').value,
                muscle: document.getElementById('f-muscle').value,
                fat: document.getElementById('f-fat').value,
                water: document.getElementById('f-water').value,
                visceral: document.getElementById('f-visceral').value,
                bodytype: document.getElementById('f-bodytype').value,
                bmr: document.getElementById('f-bmr').value,
                m_ra: document.getElementById('f-m-ra').value,
                m_la: document.getElementById('f-m-la').value,
                m_trunk: document.getElementById('f-m-trunk').value,
                m_rl: document.getElementById('f-m-rl').value,
                m_ll: document.getElementById('f-m-ll').value,
                f_ra: document.getElementById('f-f-ra').value,
                f_la: document.getElementById('f-f-la').value,
                f_trunk: document.getElementById('f-f-trunk').value,
                f_rl: document.getElementById('f-f-rl').value,
                f_ll: document.getElementById('f-f-ll').value
            };

            records.push(newRecord);
            localStorage.setItem('records', JSON.stringify(records));

            alert('學員身體組成資料儲存成功！表單已為您自動清空。');
            this.reset();
            recordDate.value = new Date().toISOString().substring(0, 10);
            document.getElementById('f-bodytype').value = "";

            studentSelect.dispatchEvent(new Event('change'));
        });

        // 4. 匯出全部資料至 JSON 檔案
        function exportJson() {
            const dataToExport = {
                students: students,
                records: records
            };
            const jsonStr = JSON.stringify(dataToExport, null, 2);
            const blob = new Blob([jsonStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `system_backup_${new Date().toISOString().substring(0, 10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // 5. 從 JSON 檔案匯入資料 (直接覆蓋本地 LocalStorage)
        function importJson(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    
                    if (importedData.students && importedData.records) {
                        // 更新記憶體狀態與 LocalStorage
                        students = importedData.students;
                        records = importedData.records;
                        
                        localStorage.setItem('students', JSON.stringify(students));
                        localStorage.setItem('records', JSON.stringify(records));
                        
                        alert('資料匯入成功！系統將自動重新整理畫面。');
                        location.reload(); // 重新整理頁面以載入新數據
                    } else {
                        alert('匯入失敗：JSON 檔案格式不正確（找不到學員或紀錄陣列）。');
                    }
                } catch (err) {
                    alert('匯入發生例外錯誤，請確認檔案是否為合法的 JSON。');
                    console.error(err);
                }
            };
            reader.readAsText(file);
            input.value = ""; // 清空 input 狀態，允許重複匯入同一個檔案
        }
    </script>

</body>
