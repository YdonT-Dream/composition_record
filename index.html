<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>專業教練數據系統</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .grid-inputs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        input { padding: 5px; border: 1px solid #ccc; border-radius: 4px; width: 90%; font-size: 12px; }
        button { padding: 8px 12px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 4px; }
        /* 強制 PDF 表格縮小 */
        table { width: 100%; border-collapse: collapse; font-size: 8px; table-layout: fixed; }
        th, td { border: 1px solid #000; padding: 2px; text-align: center; word-wrap: break-word; }
        th { background: #eee; }
    </style>
</head>
<body>

<div id="reportArea" style="max-width: 800px; margin: auto;">
    <h2 id="pdfName">學員報告</h2>
    <div id="studentHeader"><p id="pdfInfo"></p></div>

    <div class="card" id="no-print">
        <h3>管理與輸入</h3>
        <select id="studentSelect" onchange="onStudentChange()"><option value="">-- 選擇學員 --</option></select>
        <input type="text" id="name" placeholder="姓名">
        <input type="number" id="age" placeholder="年紀">
        <button onclick="saveStudent()">儲存學員</button>
        <button onclick="generatePDF()" style="background:#e74c3c;">匯出 PDF</button>
        <hr>
        <form onsubmit="saveRecord(event)" class="grid-inputs">
            <input type="date" id="date" required>
            <input type="number" id="weight" placeholder="體重" step="0.1">
            <input type="number" id="fat" placeholder="總脂%" step="0.1">
            <input type="number" id="muscle" placeholder="總肌kg" step="0.1">
            <input type="number" id="water" placeholder="水%" step="0.1">
            <input type="number" id="vFat" placeholder="內臟" step="0.5">
            <input type="number" id="mAge" placeholder="生理">
            <input type="number" id="bodyType" placeholder="體型">
            <input type="number" id="lFat" placeholder="左手脂"> <input type="number" id="rFat" placeholder="右手脂">
            <input type="number" id="tFat" placeholder="軀脂"> <input type="number" id="llFat" placeholder="左腳脂">
            <input type="number" id="rlFat" placeholder="右腳脂"> <input type="number" id="lMus" placeholder="左手肌">
            <input type="number" id="rMus" placeholder="右手肌"> <input type="number" id="tMus" placeholder="軀肌">
            <input type="number" id="llMus" placeholder="左腳肌"> <input type="number" id="rlMus" placeholder="右腳肌">
            <button type="submit" style="grid-column: span 3; background: #27ae60;">儲存紀錄</button>
        </form>
    </div>

    <div class="card">
        <h3>趨勢圖</h3>
        <canvas id="myChart" height="80"></canvas>
    </div>

    <div class="card">
        <h3>歷史數據</h3>
        <table id="historyTable">
            <thead><tr><th>日期</th><th>體型</th><th>體重</th><th>脂%</th><th>肌kg</th><th>水%</th><th>內臟</th><th>生理</th><th>左手脂</th><th>右手脂</th><th>軀脂</th><th>左腳脂</th><th>右腳脂</th><th>左手肌</th><th>右手肌</th><th>軀肌</th><th>左腳肌</th><th>右腳肌</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    // 關鍵修復：如果資料損壞，自動重設
    let systemData = JSON.parse(localStorage.getItem('coach_data'));
    if (!systemData || !systemData.students) {
        systemData = { students: {}, records: {} };
    }

    function saveStudent() {
        const name = document.getElementById('name').value.trim();
        if(!name) return alert('請輸入姓名');
        systemData.students[name] = { age: document.getElementById('age').value };
        if (!systemData.records[name]) systemData.records[name] = [];
        localStorage.setItem('coach_data', JSON.stringify(systemData));
        updateSelect();
        alert('已儲存');
    }

    function updateSelect() {
        const s = document.getElementById('studentSelect');
        s.innerHTML = '<option value="">-- 選擇學員 --</option>';
        Object.keys(systemData.students).forEach(n => s.innerHTML += `<option value="${n}">${n}</option>`);
    }

    function onStudentChange() {
        const name = document.getElementById('studentSelect').value;
        if (!name) return;
        document.getElementById('name').value = name;
        document.getElementById('pdfName').innerText = "學員: " + name;
        render(name);
    }

    function saveRecord(e) {
        e.preventDefault();
        const name = document.getElementById('studentSelect').value;
        if(!name) return alert('請先選擇學員');
        const fields = ['date','bodyType','weight','fat','muscle','water','vFat','mAge','lFat','rFat','tFat','llFat','rlFat','lMus','rMus','tMus','llMus','rlMus'];
        let rec = {};
        fields.forEach(f => rec[f] = document.getElementById(f).value);
        systemData.records[name].push(rec);
        localStorage.setItem('coach_data', JSON.stringify(systemData));
        render(name);
    }

    function render(name) {
        const recs = systemData.records[name] || [];
        const tbody = document.querySelector('#historyTable tbody');
        tbody.innerHTML = recs.map(r => `<tr><td>${r.date}</td><td>${r.bodyType}</td><td>${r.weight}</td><td>${r.fat}</td><td>${r.muscle}</td><td>${r.water}</td><td>${r.vFat}</td><td>${r.mAge}</td><td>${r.lFat}</td><td>${r.rFat}</td><td>${r.tFat}</td><td>${r.llFat}</td><td>${r.rlFat}</td><td>${r.lMus}</td><td>${r.rMus}</td><td>${r.tMus}</td><td>${r.llMus}</td><td>${r.rlMus}</td></tr>`).join('');
        
        const ctx = document.getElementById('myChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, { type: 'line', data: { labels: recs.map(r => r.date), datasets: [{ label: '體重', data: recs.map(r => r.weight), borderColor: 'blue' }] } });
    }

    function generatePDF() {
        const name = document.getElementById('studentSelect').value || "報告";
        const now = new Date();
        const fileName = `${name}_${now.toISOString().slice(0,10)}_${now.getHours()}-${now.getMinutes()}.pdf`;
        document.getElementById('no-print').style.display = 'none';
        html2pdf().from(document.getElementById('reportArea')).set({filename: fileName, jsPDF:{orientation:'landscape'}}).save().then(() => document.getElementById('no-print').style.display = 'block');
    }

    window.onload = () => { document.getElementById('date').valueAsDate = new Date(); updateSelect(); };
</script>
</body>
</html>
